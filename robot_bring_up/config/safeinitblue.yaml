# 3.17版本
# teb控制器
controller_server:
  ros__parameters:
    odom_topic: "/Odometry"
    controller_frequency: 30.0 # 运行控制器的频率 (赫兹)。
    controller_plugin_types: ["teb_local_planner::TebLocalPlannerROS"]
    goal_checker_plugins: ["general_goal_checker"] # "precise_goal_checker"
    controller_plugins: ["FollowPath"]
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.1
    FollowPath:
      plugin: teb_local_planner::TebLocalPlannerROS

      #调TEB参数请参考[TEB参数官方注释](.\teb_local_planner\teb_local_planner\cfg\TebLocalPlannerReconfigure.cfg)里面有最大值最小值默认值，参数含义等，下面的中文参数含义注释仅供参考
      teb_autosize: 1.0
      dt_ref: 0.6 # 所需的轨迹时间分辨率#3.17
      dt_hysteresis: 0.02 # 根据当前时间分辨率自动调整大小的滞后，建议使用dt_ref的 10%#3.17
      max_samples: 500
      min_samples: 3 # 最小采样数,大于2
      global_plan_overwrite_orientation: True # 覆盖全局规划器提供的局部子目标的方向（因为它们通常仅提供 2D 路径）
      allow_init_with_backwards_motion: True
      max_global_plan_lookahead_dist: 1.6 # 指定考虑优化的全局计划子集的最大长度（累积欧几里得距离）。实际长度由本地成本图大小和该最大界限的逻辑与确定。设置为零或负数以停用此限制。
      global_plan_viapoint_sep: 0.2 # 如果为正，则从全局计划中提取途经点（路径跟踪模式）。该值确定参考路径的分辨率（沿全局规划的每两个连续经由点之间的最小间隔，如果为负值：禁用）。
      global_plan_prune_distance: 0.6 #3.17
      # via_points_ordered: TDOD
      force_reinit_new_goal_dist: 1.0 # 如果之前的目标更新后的间隔超过指定值（以米为单位），则重新初始化轨迹（跳过热启动）
      force_reinit_new_goal_angular: 0.78 #3.17
      min_resolution_collision_check_angular: 3.14159265 #3.17
      # control_look_ahead_poses:  TODO
      exact_arc_length: True # 如果为 true，则规划器在速度、加速度和转弯速率计算中使用精确的弧长（-> 增加 CPU 时间），否则使用欧几里德近似。
      # feasibility_check_lookahead_distance:  TODO
      feasibility_check_no_poses: 1 # 指定每个采样间隔应检查预测计划上的哪个位姿的可行性。 3.17
      publish_feedback: True # 发布包含完整轨迹和活动障碍物列表的规划器反馈（应仅在评估或调试时启用）。3.17

      # Robot

      max_vel_x: 3.0 # 机器人最大x轴速度m/s
      max_vel_y: 3.0 # 机器人最大y轴速度m/s
      max_vel_x_backwards: 3.0 # 机器人最大x轴后退速度m/s
      max_vel_theta: 1.7 # 机器人最大角速度rad/s

      acc_lim_x: 8.0 # 机器人最大x轴平移加速度m/s^2
      acc_lim_y: 8.0 # 机器人最大y轴平移加速度m/s^2
      acc_lim_theta: 0.6 # 机器人最大角加速度rad/s^2

      min_turning_radius: 0.0 # 机器人最小转弯半径

      is_footprint_dynamic: False
      footprint_model: # types: "point", "circular", "two_circles", "line", "polygon"
        # type: "two_circles"
        # front_offset: 0.15
        # front_radius: 0.2
        # rear_offset: -0.15
        # rear_radius: 0.2

        type: "polygon"
        vertices: "[ [0.3, 0.2], [-0.3, 0.2], [-0.3, -0.2], [0.3, -0.2] ]"
      #    type: "circular"
      #    radius: 0.4 # for type "circular"

      # GoalTolerance

      free_goal_vel: False # 去除目标速度约束，使机器人能够以最大速度到达目标

      # Obstacles

      min_obstacle_dist: 0.05 # 机器人与障碍物之间的最小距离（以米为单位）3.17
      inflation_dist: 0.25 # 非零惩罚成本的障碍物周围的缓冲区（应大于min_obstacle_dist才能生效）。3.17
      include_costmap_obstacles: True # 指定是否应考虑本地成本图的障碍。每个被标记为障碍物的单元格都被视为点障碍物。因此，不要RM选择非常小的代价图分辨率，因为它会增加计算时间。
      costmap_obstacles_behind_robot_dist: 4.0 # 限制机器人后面规划时考虑的占用的本地成本图障碍（指定距离以米为单位）。
      obstacle_poses_affected: 15 # 每个障碍物位置都附加到轨迹上最近的姿势以保持距离。还可以考虑其他邻居。如果legacy_obstacle_association是false，则不启用
      legacy_obstacle_association: false # 如果为 true，则使用旧的障碍物关联方法，
      # 该方法将障碍物与轨迹上最近的姿势相关联。如果为 false，则使用新的障碍物关联方法，
      # 该方法将障碍物与轨迹上最近的姿势相关联，并考虑其他邻居。
      obstacle_association_force_inclusion_factor: 20.0 # 非传统障碍物关联策略尝试在优化过程中仅将相关障碍物与离散化轨迹连接起来。但指定距离内的所有障碍物都必须包含在内（作为min_obstacle_dist的倍数）。例如，选择 2.0 是为了在 2.0* min_obstacle_dist 的半径内强制考虑障碍物。 [仅当参数legacy_obstacle_association为false时才使用此参数]
      obstacle_association_cutoff_factor: 100.0 # 但超出[value]* min_obstacle_dist的倍数时，所有障碍物在优化期间都会被忽略。首先处理参数barrier_association_force_inclusion_factor 。 [仅当参数legacy_obstacle_association为false时才使用此参数]

      dynamic_obstacle_inflation_dist: 0.3
      include_dynamic_obstacles: True # 如果此参数设置为 true，则在优化过程中通过恒定速度模型来预测和考虑 非零速度障碍物的运动（通过主题~/obstacles上用户提供的障碍物提供或从costmap_converter获得）。

      costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
      costmap_converter_spin_thread: True
      costmap_converter_rate: 10.0

      # Optimization

      no_inner_iterations: 5 # 每次外循环迭代中调用的实际求解器迭代次数。
      no_outer_iterations: 4 # 每次外循环迭代都会根据所需的时间分辨率dt_ref自动调整轨迹大小，并调用内部优化器（执行no_inner_iterations）。因此，每个规划周期中求解器迭代的总数是两个值的乘积。
      optimization_activate: True
      optimization_verbose: False
      penalty_epsilon: 0.146 # 为硬约束近似的惩罚函数添加一个小的安全裕度
      obstacle_cost_exponent: 0.65 #3.17
      weight_max_vel_x: 2.8 # 满足最大允许平移速度的优化权重 2.28
      weight_max_vel_y: 1.2 # 满足最大允许平移速度的优化权重 3.17
      weight_max_vel_theta: 0.8 # 满足最大允许角速度的优化权重
      weight_acc_lim_x: 1.5 # 满足最大允许平移加速度的优化权重
      weight_acc_lim_y: 1.2 # 满足最大允许平移加速度的优化权重
      weight_acc_lim_theta: 0.8 # 满足最大允许角加速度的优化权重
      weight_kinematics_nh: 900.0 # 满足非完整运动学约束(不平移、原地旋转）的优化权重，该参数必须很高 3.17
      weight_kinematics_forward_drive: 6000.0 # 用于迫使机器人仅选择前进方向（正平移速度）的优化权重。较小的权重（例如 1.0）仍然允许向后行驶。 1000左右的值几乎可以防止向后行驶（但不能保证）。
      weight_optimaltime: 1000.0 # must be > 0 用于收缩相对于转换/执行时间的轨迹的优化权重 2.28
      weight_shortest_path: 10.0
      weight_obstacle: 500.0 # 用于满足与障碍物距离的权重 2.28
      weight_inflation: 0.1 # 膨胀区域的权重 应该很小
      weight_dynamic_obstacle: 10.0 # not in use yet
      weight_dynamic_obstacle_inflation: 0.2
      weight_viapoint: 1000.0 # 用于最小化到过点（或参考路径）的距离的优化权重。
      weight_adapt_factor: 2.0 # 一些特殊权重（当前为weight_obstacle）在每次外部TEB迭代中都会按此因子重复缩放（weight_new =weight_old*factor）。迭代地增加权重而不是预先设置一个巨大的值会导致底层优化问题的更好的数值条件。
      # weight_prefer_rotdir: TODO
      # weight_velocity_obstacle_ratio: TODO

      # Homotopy Class Planner

      enable_homotopy_class_planning: True # 在独特的拓扑中激活并行规划（需要更多的 CPU 资源，因为同时优化多个轨迹）
      enable_multithreading: True # 激活多线程以便在不同线程中规划每个轨迹
      # simple_exploration: TODO
      max_number_classes: 2 # 指定考虑的独特轨迹的最大数量（限制计算量）3.17
      selection_cost_hysteresis: 5.0 # 指定新候选者必须具有多少轨迹成本才能被选择（如果 new_cost < old_cost*factor 则选择）。
      # selection_prefer_initial_plan: 1.0 #为初始计划等价类中的轨迹指定区间（0,1）内的成本缩减量
      selection_viapoint_cost_scale: 1.0 # 额外缩放经过点成本项只是为了选择"最佳"候选者。
      selection_obst_cost_scale: 1.0 # 障碍成本项的额外缩放只是为了选择"最佳"候选者。
      selection_alternative_time_cost: True # 如果为 true，则时间成本（时间差的平方和）将替换为总转换时间（时间差的总和）。

      roadmap_graph_samples: 15 # 指定为创建路线图而生成的样本数量
      roadmap_graph_area_width: 5.0 # 在起点和目标之间的矩形区域中对随机关键点/路径点进行采样。指定该区域的宽度（以米为单位）。
      # roadmap_graph_area_length_scale: 1.0 TODO
      h_signature_prescaler: 0.5 # 用于区分同伦类的尺度内部参数（H-signature ）。警告：仅减少此参数，如果您观察到局部成本图中障碍物过多的问题，请不要选择极低的值，否则无法区分障碍物（0.2<值<=1）。
      h_signature_threshold: 0.1 # 如果实部和复数部分的差值均低于指定阈值，则假定两个 H 签名相等。
      obstacle_heading_threshold: 0.45 # 指定障碍物航向和目标航向之间的标量积的值，以便在探索时将它们（障碍物）考虑在内。
      # obstacle_keypoint_offset: TODO
      switching_blocking_period: 0.0 # 指定在允许切换到新的等价类之前需要到期的持续时间（以秒为单位）。
      viapoints_all_candidates: True # 如果为真，则不同拓扑的所有轨迹都附加到一组via-point，否则只有与初始/全局计划共享相同拓扑的轨迹与它们连接（对test_optim_node没有影响）。
      # delete_detours_backwards: True
      # detours_orientation_tolerance:
      # length_start_orientation_vector:
      # selection_dropping_probability:
      # max_ratio_detours_duration_best_duration: 3.0
      # visualize_hc_graph: False # 可视化为探索独特轨迹而创建的图表（检查 rviz 中的标记消息）
      # visualize_with_time_as_z_axis_scale: 0.0

      # Recovery

      shrink_horizon_backup: True #在自动检测到问题(plan not feasible)的情况下，允许planner临时缩小范围(50%). TEB将以更近的点作为规划目标，尝试重新规划出可行路径。调试时可关闭，以在可视化界面上观察原出错路径。另请参阅参数shrink_horizo​​n_min_duration
      shrink_horizon_min_duration: 10.0 #在自动检测到问题(plan not feasible)的情况下，允许planner临时缩小范围(50%). TEB将以更近的点作为规划目标，尝试重新规划出可行路径。调试时可关闭，以在可视化界面上观察原出错路径。另请参阅参数shrink_horizo​​n_min_duration
      oscillation_recovery: True # 尝试检测并解决同一等价类中多个解决方案之间的振荡（机器人经常在左/右/前/后之间切换
      oscillation_v_eps: 0.1
      oscillation_omega_eps: 0.1
      oscillation_recovery_min_duration: 10.0
      oscillation_filter_duration: 10.0
