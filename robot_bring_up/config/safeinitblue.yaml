planner_server:
  ros__parameters:
    expected_planner_frequency: 30.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5 # 请求的目标姿态和路径末端之间的公差 (米)。
      use_astar: true # 是否使用A*。如果错误，则使用Dijkstra的扩展。
      allow_unknown: true # 是否允许在未知空间进行规划。
      use_final_approach_orientation: true # 如果为true，则由planner产生的路径的最后姿态将其方向设置为进近方向，即连接路径最后两点的向量的方向

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    point_topic: "/cloud_obstacle"
    cycle_frequency: 50.0
    behavior_plugins: ["keep_away_from_obstacles"]
    robot_radius: 0.3
    keep_away_from_obstacles:
      plugin: "nav2_behaviors/KeepAwayFromObstacles"
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 0.1

waypoint_follower:
  ros__parameters:
    loop_rate: 50
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 50.0
    scale_velocities: True
    feedback: "OPEN_LOOP"
    max_velocity: [30.0, 30.0, 30.0]
    min_velocity: [-30.0, -30.0, -30.0]
    max_accel: [10.0, 10.0, 200.0]
    max_decel: [-10.0, -10.0, -200.0]
    odom_topic: "/Odometry"
    odom_duration: 0.02
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0


navigation_manager:
  ros__parameters:
    target_point:
      x: 0.0
      y: 0.0
      z: 0.0
    global_frame: map
    robot_base_frame: base_link
